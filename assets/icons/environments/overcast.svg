<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="overcastGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2028" />
      <stop offset="50%" stop-color="#2a3340" />
      <stop offset="100%" stop-color="#3a4450" />
    </linearGradient>
    <clipPath id="bounds">
      <rect width="24" height="24" rx="3"/>
    </clipPath>
  </defs>
  <rect width="24" height="24" rx="3" fill="url(#overcastGrad)" />

  <g clip-path="url(#bounds)">
    <!-- Back cloud -->
    <g opacity="0.45">
      <circle cx="17"  cy="16"  r="2.8" fill="#8a9ab0"/>
      <circle cx="13.5" cy="15.5" r="2.2" fill="#8a9ab0"/>
      <circle cx="20"  cy="16.5" r="2.2" fill="#8a9ab0"/>
      <ellipse cx="16.5" cy="17.5" rx="4.5" ry="1.8" fill="#8a9ab0"/>
    </g>

    <!-- Front cloud -->
    <circle cx="9"   cy="15"   r="3"   fill="#b0bec8"/>
    <circle cx="13"  cy="14"   r="3.5" fill="#b0bec8"/>
    <circle cx="16.5" cy="15"  r="2.6" fill="#b0bec8"/>
    <circle cx="6.5" cy="15.5" r="2.2" fill="#b0bec8"/>
    <ellipse cx="11.5" cy="16.8" rx="5.5" ry="1.6" fill="#b0bec8"/>
  </g>
</svg>